<!-- layouts/shortcodes/compact-list.html -->
<div class="compact-list-wrapper">
  {{ .Inner | markdownify }}
</div>

<style>
  /* Target all lists and items inside this specific wrapper */
  .compact-list-wrapper ul, 
  .compact-list-wrapper ol {
    margin-top: 0;
    margin-bottom: 0;
    padding-left: 1.5rem;
  }
  .compact-list-wrapper li {
    margin-bottom: 0 !important; /* Removes theme-enforced gaps */
    line-height: 1.3;
  }
  /* Style for nested items specifically */
  .compact-list-wrapper li ul {
    margin-left: 1rem;
  }
</style>
